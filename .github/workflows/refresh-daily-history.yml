name: Refresh Daily History

on:
  workflow_dispatch:
  schedule:
    - cron: "29 0 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
  TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
  PUBLIC_BUCKET: ews-public
  STATE_BUCKET: ews-state
  EWS_PUBLIC_URL: https://ews.kylemcdonald.net/
  EWS_RSS_URL: https://ews.kylemcdonald.net/rss.xml

concurrency:
  group: refresh-daily-history
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          npm ci
          pip install -r requirements.txt

      - name: Restore deployment state
        run: |
          mkdir -p data
          for attempt in 1 2 3 4 5; do
            if npx wrangler r2 object get "${STATE_BUCKET}/ews.sqlite" --file data/ews.sqlite --remote; then
              exit 0
            fi
            echo "R2 restore attempt ${attempt} failed."
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Roll daily history forward
        run: python3 scripts/backfill_history.py --relative-days 1

      - name: Refresh latest heatmap
        run: python3 scripts/update_latest_heatmap.py

      - name: Export published dashboard snapshot
        run: node scripts/export_dashboard_snapshot.js --output tmp/dashboard.json

      - name: Send Telegram emergency alert
        run: node scripts/send_telegram_alert.js

      - name: Update RSS feed
        id: rss
        run: |
          RSS_RESULT="$(node scripts/update_rss_feed.js --output tmp/rss.xml)"
          echo "$RSS_RESULT"
          RSS_UPDATED="$(node -e 'const data = JSON.parse(process.argv[1]); process.stdout.write(data.updated ? "true" : "false")' "$RSS_RESULT")"
          echo "updated=${RSS_UPDATED}" >> "$GITHUB_OUTPUT"

      - name: Upload deployment state
        run: |
          for attempt in 1 2 3 4 5; do
            if npx wrangler r2 object put "${STATE_BUCKET}/ews.sqlite" --file data/ews.sqlite --remote; then
              exit 0
            fi
            echo "R2 state upload attempt ${attempt} failed."
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Publish RSS feed
        if: steps.rss.outputs.updated == 'true'
        run: |
          for attempt in 1 2 3 4 5; do
            if npx wrangler r2 object put "${PUBLIC_BUCKET}/rss.xml" \
              --file tmp/rss.xml \
              --remote \
              --content-type application/rss+xml \
              --cache-control "public, max-age=300"; then
              exit 0
            fi
            echo "R2 RSS publish attempt ${attempt} failed."
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Deploy updated RSS endpoint
        if: steps.rss.outputs.updated == 'true'
        run: |
          npm run build
          cp tmp/rss.xml client/dist/rss.xml
          npx wrangler pages deploy client/dist --project-name apocalypse-ews --branch main --commit-hash "$GITHUB_SHA"

      - name: Publish live snapshot
        run: |
          for attempt in 1 2 3 4 5; do
            if npx wrangler r2 object put "${PUBLIC_BUCKET}/dashboard.json" \
              --file tmp/dashboard.json \
              --remote \
              --content-type application/json \
              --cache-control "public, max-age=300"; then
              exit 0
            fi
            echo "R2 snapshot publish attempt ${attempt} failed."
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done
