name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - client/**
      - package.json
      - package-lock.json
      - .github/workflows/deploy-pages.yml

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  PUBLIC_BUCKET: ews-public
  EWS_PUBLIC_URL: https://ews.kylemcdonald.net/
  EWS_RSS_URL: https://ews.kylemcdonald.net/rss.xml

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply public snapshot CORS
        run: npx wrangler r2 bucket cors set "${PUBLIC_BUCKET}" --file config/r2.public.cors.json

      - name: Restore current RSS feed
        run: npx wrangler r2 object get "${PUBLIC_BUCKET}/rss.xml" --file client/public/rss.xml --remote || true

      - name: Build client
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy client/dist --project-name apocalypse-ews --branch main --commit-hash "$GITHUB_SHA"
